<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sands of Time Tracker</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #e5a93c; /* Warm Sand Gold */
            --table-border: #333;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            max-width: 650px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            margin-top: 0;
            color: var(--accent-color);
            font-size: 28px;
            letter-spacing: 1px;
        }

        .input-row {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .input-group {
            flex: 1;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #aaa;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        #canvas-container {
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }

        canvas {
            background-color: #151515;
            border-radius: 12px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
        }

        .stats {
            margin: 20px 0;
            font-size: 18px;
            line-height: 1.6;
        }
        
        .percentage {
            font-size: 26px;
            font-weight: bold;
            color: var(--accent-color);
        }

        .tables-container {
            display: flex;
            gap: 20px;
            margin-top: 25px;
        }

        /* Stats Tables Styling */
        table {
            flex: 1;
            border-collapse: collapse;
            background-color: #181818;
            border-radius: 8px;
            overflow: hidden;
            font-size: 14px;
        }

        th, td {
            padding: 10px 12px;
            text-align: left;
        }

        th {
            background-color: #252525;
            color: var(--accent-color);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table-title-left { color: #5cb85c; }
        .table-title-right { color: #d9534f; }

        tr {
            border-bottom: 1px solid var(--table-border);
        }

        tr:last-child {
            border-bottom: none;
        }

        td.value {
            text-align: right;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 15px;
            color: #fff;
        }

        @media (max-width: 600px) {
            .tables-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>The Sands of Time</h1>
    
    <div class="input-row">
        <div class="input-group">
            <label for="birth-year">Birth Year:</label>
            <input type="number" id="birth-year" min="1900" max="2026" value="2000" oninput="calculateLife()">
        </div>

        <div class="input-group">
            <label for="lifespan-years">Estimated Lifespan (Years):</label>
            <input type="number" id="lifespan-years" min="1" max="150" value="80" oninput="calculateLife()">
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="hourglassCanvas" width="300" height="340"></canvas>
    </div>

    <div class="stats">
        <div>You have lived <span class="percentage" id="pct-output">0.0%</span> of your estimated time.</div>
        <div style="margin-top: 5px;">Remaining time: <strong id="remaining-output" style="color: #fff;">0.00</strong> years.</div>
    </div>

    <div class="tables-container">
        <table>
            <thead>
                <tr>
                    <th colspan="2" class="table-title-left">Time You Have Lived</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>Months</td><td class="value" id="l-months">-</td></tr>
                <tr><td>Weeks</td><td class="value" id="l-weeks">-</td></tr>
                <tr><td>Days</td><td class="value" id="l-days">-</td></tr>
                <tr><td>Hours</td><td class="value" id="l-hours">-</td></tr>
                <tr><td>Minutes</td><td class="value" id="l-minutes">-</td></tr>
                <tr><td>Seconds</td><td class="value" id="l-seconds">-</td></tr>
            </tbody>
        </table>

        <table>
            <thead>
                <tr>
                    <th colspan="2" class="table-title-right">Time You Have Left</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>Months</td><td class="value" id="r-months">-</td></tr>
                <tr><td>Weeks</td><td class="value" id="r-weeks">-</td></tr>
                <tr><td>Days</td><td class="value" id="r-days">-</td></tr>
                <tr><td>Hours</td><td class="value" id="r-hours">-</td></tr>
                <tr><td>Minutes</td><td class="value" id="r-minutes">-</td></tr>
                <tr><td>Seconds</td><td class="value" id="r-seconds">-</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const canvas = document.getElementById('hourglassCanvas');
    const ctx = canvas.getContext('2d');
    
    let currentDisplayPercentage = 0;
    let animationFrameId;

    function calculateLife() {
        const birthYear = parseInt(document.getElementById('birth-year').value);
        const lifespanYears = parseInt(document.getElementById('lifespan-years').value);
        
        if (isNaN(birthYear) || isNaN(lifespanYears) || lifespanYears <= 0) {
            return; 
        }

        const now = new Date();
        const birthDate = new Date(birthYear, 0, 1); // Approximation: Jan 1st of birth year
        const deathDate = new Date(birthYear + lifespanYears, 0, 1); 

        const totalLifespanMs = deathDate - birthDate;
        const livedMs = now - birthDate;
        const remainingMs = deathDate - now;

        if (livedMs < 0 || remainingMs < 0) {
            // Handle edge cases where current date exceeds bounds
            document.getElementById('pct-output').innerText = livedMs < 0 ? '0.0%' : '100.0%';
            document.getElementById('remaining-output').innerText = '0.00';
            return;
        }

        // Percentage and Years Calculations
        const passedPercentage = Math.min(Math.max((livedMs / totalLifespanMs) * 100, 0), 100);
        const remainingYears = Math.max(remainingMs / (1000 * 60 * 60 * 24 * 365.25), 0);

        document.getElementById('pct-output').innerText = passedPercentage.toFixed(5) + '%';
        document.getElementById('remaining-output').innerText = remainingYears.toFixed(2);

        // Constants for conversion
        const MS_PER_SEC = 1000;
        const MS_PER_MIN = MS_PER_SEC * 60;
        const MS_PER_HOUR = MS_PER_MIN * 60;
        const MS_PER_DAY = MS_PER_HOUR * 24;
        const MS_PER_WEEK = MS_PER_DAY * 7;
        const MS_PER_MONTH = MS_PER_DAY * 30.437; // Average month length

        // --- Populate Lived Table ---
        document.getElementById('l-seconds').innerText = Math.floor(livedMs / MS_PER_SEC).toLocaleString();
        document.getElementById('l-minutes').innerText = Math.floor(livedMs / MS_PER_MIN).toLocaleString();
        document.getElementById('l-hours').innerText = Math.floor(livedMs / MS_PER_HOUR).toLocaleString();
        document.getElementById('l-days').innerText = Math.floor(livedMs / MS_PER_DAY).toLocaleString();
        document.getElementById('l-weeks').innerText = Math.floor(livedMs / MS_PER_WEEK).toLocaleString();
        document.getElementById('l-months').innerText = Math.floor(livedMs / MS_PER_MONTH).toLocaleString();

        // --- Populate Remaining Table ---
        document.getElementById('r-seconds').innerText = Math.floor(remainingMs / MS_PER_SEC).toLocaleString();
        document.getElementById('r-minutes').innerText = Math.floor(remainingMs / MS_PER_MIN).toLocaleString();
        document.getElementById('r-hours').innerText = Math.floor(remainingMs / MS_PER_HOUR).toLocaleString();
        document.getElementById('r-days').innerText = Math.floor(remainingMs / MS_PER_DAY).toLocaleString();
        document.getElementById('r-weeks').innerText = Math.floor(remainingMs / MS_PER_WEEK).toLocaleString();
        document.getElementById('r-months').innerText = Math.floor(remainingMs / MS_PER_MONTH).toLocaleString();

        // Manage animation loops smoothly
        cancelAnimationFrame(animationFrameId);
        animateSand(passedPercentage);
    }

    function animateSand(targetPercentage) {
        if (Math.abs(currentDisplayPercentage - targetPercentage) > 0.1) {
            currentDisplayPercentage += (targetPercentage - currentDisplayPercentage) * 0.05;
        } else {
            currentDisplayPercentage = targetPercentage;
        }

        drawHourglass(currentDisplayPercentage);
        animationFrameId = requestAnimationFrame(calculateLife);
    }

    function drawHourglass(percentage) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const width = 130;
        const height = 220;
        const topY = cy - height/2;
        const bottomY = cy + height/2;
        const neckWidth = 10;

        // --- 1. Draw Outer Glass ---
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(cx - width/2, topY);
        ctx.lineTo(cx + width/2, topY);
        ctx.bezierCurveTo(cx + width/2, cy - height/4, cx + neckWidth, cy - 8, cx + neckWidth, cy);
        ctx.bezierCurveTo(cx + neckWidth, cy + 8, cx + width/2, cy + height/4, cx + width/2, bottomY);
        ctx.lineTo(cx - width/2, bottomY);
        ctx.bezierCurveTo(cx - width/2, cy + height/4, cx - neckWidth, cy + 8, cx - neckWidth, cy);
        ctx.bezierCurveTo(cx - neckWidth, cy - 8, cx - width/2, cy - height/4, cx - width/2, topY);
        ctx.closePath();
        ctx.stroke();

        ctx.fillStyle = '#e5a93c'; 

        // --- 2. Top Bulb Sand ---
        const topSandHeight = (height / 2 - 10) * (1 - percentage / 100);
        if (topSandHeight > 0) {
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(cx - width/2, topY);
            ctx.lineTo(cx + width/2, topY);
            ctx.bezierCurveTo(cx + width/2, cy - height/4, cx + neckWidth, cy - 8, cx + neckWidth, cy);
            ctx.lineTo(cx - neckWidth, cy);
            ctx.bezierCurveTo(cx - neckWidth, cy - 8, cx - width/2, cy - height/4, cx - width/2, topY);
            ctx.clip();

            ctx.fillRect(cx - width, cy - topSandHeight, width * 2, topSandHeight);
            ctx.restore();
        }

        // --- 3. Bottom Bulb Sand Pile ---
        const bottomSandHeight = (height / 2 - 15) * (percentage / 100);
        if (bottomSandHeight > 0) {
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(cx + neckWidth, cy);
            ctx.bezierCurveTo(cx + neckWidth, cy + 8, cx + width/2, cy + height/4, cx + width/2, bottomY);
            ctx.lineTo(cx - width/2, bottomY);
            ctx.bezierCurveTo(cx - width/2, cy + height/4, cx - neckWidth, cy + 8, cx - neckWidth, cy);
            ctx.clip();

            ctx.beginPath();
            ctx.moveTo(cx - width, bottomY);
            ctx.lineTo(cx, bottomY - bottomSandHeight - 10); 
            ctx.lineTo(cx + width, bottomY);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        // --- 4. Falling Sand Stream ---
        if (percentage < 100 && percentage > 0) {
            ctx.strokeStyle = '#e5a93c';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(cx, cy - topSandHeight);
            ctx.lineTo(cx, bottomY - bottomSandHeight);
            ctx.stroke();
        }

        // --- 5. Wood Frame ---
        ctx.fillStyle = '#3a2512'; 
        ctx.fillRect(cx - width/2 - 15, topY - 12, width + 30, 12);
        ctx.fillRect(cx - width/2 - 15, bottomY, width + 30, 12);
    }

    calculateLife();
</script>

</body>
</html>
