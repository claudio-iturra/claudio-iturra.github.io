<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Sands of Time Tracker</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #e5a93c; /* Warm Sand Gold */
            --table-border: #333;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            max-width: 650px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            margin-top: 0;
            color: var(--accent-color);
            font-size: 28px;
            letter-spacing: 1px;
        }

        .config-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
            background: #181818;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #2a2a2a;
        }

        .section-title {
            text-align: left;
            margin: 0 0 5px 0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            font-weight: bold;
        }

        .birth-inputs-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .lifespan-wrapper {
            text-align: left;
            margin-top: 5px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 600;
            color: #aaa;
        }

        select, input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            cursor: pointer;
        }

        select:focus, input:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        #canvas-container {
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }

        canvas {
            background-color: #151515;
            border-radius: 12px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
        }

        .stats {
            margin: 20px 0;
            font-size: 18px;
            line-height: 1.6;
        }
        
        .percentage {
            font-size: 26px;
            font-weight: bold;
            color: var(--accent-color);
        }

        .tables-container {
            display: flex;
            gap: 20px;
            margin-top: 25px;
        }

        table {
            flex: 1;
            border-collapse: collapse;
            background-color: #181818;
            border-radius: 8px;
            overflow: hidden;
            font-size: 14px;
        }

        th, td {
            padding: 10px 12px;
            text-align: left;
        }

        th {
            background-color: #252525;
            color: var(--accent-color);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table-title-left { color: #5cb85c; }
        .table-title-right { color: #d9534f; }

        tr {
            border-bottom: 1px solid var(--table-border);
        }

        tr:last-child {
            border-bottom: none;
        }

        td.value {
            text-align: right;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 15px;
            color: #fff;
        }

        @media (max-width: 600px) {
            .birth-inputs-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .tables-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>The Sands of Time</h1>
    
    <div class="config-section">
        <h2 class="section-title">Birth Date & Time Setup</h2>
        <div class="birth-inputs-grid">
            <div class="input-group">
                <label for="birth-year">Year</label>
                <select id="birth-year" onchange="updateDays(); calculateLife();"></select>
            </div>
            <div class="input-group">
                <label for="birth-month">Month</label>
                <select id="birth-month" onchange="updateDays(); calculateLife();"></select>
            </div>
            <div class="input-group">
                <label for="birth-day">Day</label>
                <select id="birth-day" onchange="calculateLife();"></select>
            </div>
            <div class="input-group">
                <label for="birth-hour">Hour</label>
                <select id="birth-hour" onchange="calculateLife();"></select>
            </div>
            <div class="input-group">
                <label for="birth-minute">Minute</label>
                <select id="birth-minute" onchange="calculateLife();"></select>
            </div>
        </div>

        <div class="lifespan-wrapper">
            <div class="input-group" style="width: 100%;">
                <label for="lifespan-years" style="color: var(--accent-color);">Estimated Lifespan (Years):</label>
                <input type="number" id="lifespan-years" min="1" max="150" value="80" oninput="calculateLife()">
            </div>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="hourglassCanvas" width="300" height="340"></canvas>
    </div>

    <div class="stats">
        <div>You have lived <span class="percentage" id="pct-output">0.00000%</span> of your estimated time.</div>
        <div style="margin-top: 5px;">Remaining time: <strong id="remaining-output" style="color: #fff;">0.00</strong> years.</div>
    </div>

    <div class="tables-container">
        <table>
            <thead>
                <tr>
                    <th colspan="2" class="table-title-left">Time You Have Lived</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>Months</td><td class="value" id="l-months">-</td></tr>
                <tr><td>Weeks</td><td class="value" id="l-weeks">-</td></tr>
                <tr><td>Days</td><td class="value" id="l-days">-</td></tr>
                <tr><td>Hours</td><td class="value" id="l-hours">-</td></tr>
                <tr><td>Minutes</td><td class="value" id="l-minutes">-</td></tr>
                <tr><td>Seconds</td><td class="value" id="l-seconds">-</td></tr>
            </tbody>
        </table>

        <table>
            <thead>
                <tr>
                    <th colspan="2" class="table-title-right">Time You Have Left</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>Months</td><td class="value" id="r-months">-</td></tr>
                <tr><td>Weeks</td><td class="value" id="r-weeks">-</td></tr>
                <tr><td>Days</td><td class="value" id="r-days">-</td></tr>
                <tr><td>Hours</td><td class="value" id="r-hours">-</td></tr>
                <tr><td>Minutes</td><td class="value" id="r-minutes">-</td></tr>
                <tr><td>Seconds</td><td class="value" id="r-seconds">-</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const canvas = document.getElementById('hourglassCanvas');
    const ctx = canvas.getContext('2d');
    
    let currentDisplayPercentage = 0;
    let animationFrameId;

    // Build Selector Options on Load
    function initializeDropdowns() {
        const yearSel = document.getElementById('birth-year');
        const monthSel = document.getElementById('birth-month');
        const hourSel = document.getElementById('birth-hour');
        const minSel = document.getElementById('birth-minute');

        const currentYear = 2026;

        // Populate Years (1900 to present)
        for(let y = currentYear; y >= 1900; y--) {
            yearSel.add(new Option(y, y));
        }
        yearSel.value = 2000; // default value

        // Populate Months
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        monthNames.forEach((name, idx) => {
            monthSel.add(new Option(name, idx));
        });

        // Populate Hours (0-23)
        for(let h = 0; h < 24; h++) {
            hourSel.add(new Option(h.toString().padStart(2, '0'), h));
        }

        // Populate Minutes (0-59)
        for(let m = 0; m < 60; m++) {
            minSel.add(new Option(m.toString().padStart(2, '0'), m));
        }

        updateDays();
    }

    // Handles dynamically changing day limits (e.g. Feb 28 vs 29, months with 30 vs 31 days)
    function updateDays() {
        const year = parseInt(document.getElementById('birth-year').value);
        const month = parseInt(document.getElementById('birth-month').value);
        const daySel = document.getElementById('birth-day');
        
        const previousValue = daySel.value || 1;
        daySel.innerHTML = "";

        // Get total days in target month
        const totalDays = new Date(year, month + 1, 0).getDate();

        for(let d = 1; d <= totalDays; d++) {
            daySel.add(new Option(d, d));
        }

        // Retain original day choice if safely fits within limits
        daySel.value = previousValue <= totalDays ? previousValue : totalDays;
    }

    function calculateLife() {
        const year = parseInt(document.getElementById('birth-year').value);
        const month = parseInt(document.getElementById('birth-month').value);
        const day = parseInt(document.getElementById('birth-day').value);
        const hour = parseInt(document.getElementById('birth-hour').value);
        const minute = parseInt(document.getElementById('birth-minute').value);
        const lifespanYears = parseInt(document.getElementById('lifespan-years').value);
        
        if (isNaN(lifespanYears) || lifespanYears <= 0) return;

        const now = new Date();
        const birthDate = new Date(year, month, day, hour, minute, 0);
        
        const deathDate = new Date(birthDate);
        deathDate.setFullYear(birthDate.getFullYear() + lifespanYears);

        const totalLifespanMs = deathDate - birthDate;
        const livedMs = now - birthDate;
        const remainingMs = deathDate - now;

        if (livedMs < 0 || remainingMs < 0) {
            document.getElementById('pct-output').innerText = livedMs < 0 ? '0.00000%' : '100.00000%';
            document.getElementById('remaining-output').innerText = '0.00';
            return;
        }

        const passedPercentage = Math.min(Math.max((livedMs / totalLifespanMs) * 100, 0), 100);
        const remainingYears = Math.max(remainingMs / (1000 * 60 * 60 * 24 * 365.25), 0);

        document.getElementById('pct-output').innerText = passedPercentage.toFixed(5) + '%';
        document.getElementById('remaining-output').innerText = remainingYears.toFixed(2);

        // Unit breakdown parameters
        const MS_PER_SEC = 1000;
        const MS_PER_MIN = MS_PER_SEC * 60;
        const MS_PER_HOUR = MS_PER_MIN * 60;
        const MS_PER_DAY = MS_PER_HOUR * 24;
        const MS_PER_WEEK = MS_PER_DAY * 7;
        const MS_PER_MONTH = MS_PER_DAY * 30.437;

        // --- Lived Table ---
        document.getElementById('l-seconds').innerText = Math.floor(livedMs / MS_PER_SEC).toLocaleString();
        document.getElementById('l-minutes').innerText = Math.floor(livedMs / MS_PER_MIN).toLocaleString();
        document.getElementById('l-hours').innerText = Math.floor(livedMs / MS_PER_HOUR).toLocaleString();
        document.getElementById('l-days').innerText = Math.floor(livedMs / MS_PER_DAY).toLocaleString();
        document.getElementById('l-weeks').innerText = Math.floor(livedMs / MS_PER_WEEK).toLocaleString();
        document.getElementById('l-months').innerText = Math.floor(livedMs / MS_PER_MONTH).toLocaleString();

        // --- Remaining Table ---
        document.getElementById('r-seconds').innerText = Math.floor(remainingMs / MS_PER_SEC).toLocaleString();
        document.getElementById('r-minutes').innerText = Math.floor(remainingMs / MS_PER_MIN).toLocaleString();
        document.getElementById('r-hours').innerText = Math.floor(remainingMs / MS_PER_HOUR).toLocaleString();
        document.getElementById('r-days').innerText = Math.floor(remainingMs / MS_PER_DAY).toLocaleString();
        document.getElementById('r-weeks').innerText = Math.floor(remainingMs / MS_PER_WEEK).toLocaleString();
        document.getElementById('r-months').innerText = Math.floor(remainingMs / MS_PER_MONTH).toLocaleString();

        cancelAnimationFrame(animationFrameId);
        animateSand(passedPercentage);
    }

    function animateSand(targetPercentage) {
        if (Math.abs(currentDisplayPercentage - targetPercentage) > 0.05) {
            currentDisplayPercentage += (targetPercentage - currentDisplayPercentage) * 0.05;
        } else {
            currentDisplayPercentage = targetPercentage;
        }

        drawHourglass(currentDisplayPercentage);
        animationFrameId = requestAnimationFrame(calculateLife);
    }

    function drawHourglass(percentage) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const width = 130;
        const height = 220;
        const topY = cy - height/2;
        const bottomY = cy + height/2;
        const neckWidth = 10;

        // --- Outer Glass ---
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(cx - width/2, topY);
        ctx.lineTo(cx + width/2, topY);
        ctx.bezierCurveTo(cx + width/2, cy - height/4, cx + neckWidth, cy - 8, cx + neckWidth, cy);
        ctx.bezierCurveTo(cx + neckWidth, cy + 8, cx + width/2, cy + height/4, cx + width/2, bottomY);
        ctx.lineTo(cx - width/2, bottomY);
        ctx.bezierCurveTo(cx - width/2, cy + height/4, cx - neckWidth, cy + 8, cx - neckWidth, cy);
        ctx.bezierCurveTo(cx - neckWidth, cy - 8, cx - width/2, cy - height/4, cx - width/2, topY);
        ctx.closePath();
        ctx.stroke();

        ctx.fillStyle = '#e5a93c'; 

        // --- Top Bulb Sand ---
        const topSandHeight = (height / 2 - 10) * (1 - percentage / 100);
        if (topSandHeight > 0) {
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(cx - width/2, topY);
            ctx.lineTo(cx + width/2, topY);
            ctx.bezierCurveTo(cx + width/2, cy - height/4, cx + neckWidth, cy - 8, cx + neckWidth, cy);
            ctx.lineTo(cx - neckWidth, cy);
            ctx.bezierCurveTo(cx - neckWidth, cy - 8, cx - width/2, cy - height/4, cx - width/2, topY);
            ctx.clip();

            ctx.fillRect(cx - width, cy - topSandHeight, width * 2, topSandHeight);
            ctx.restore();
        }

        // --- Bottom Bulb Sand Pile ---
        const bottomSandHeight = (height / 2 - 15) * (percentage / 100);
        if (bottomSandHeight > 0) {
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(cx + neckWidth, cy);
            ctx.bezierCurveTo(cx + neckWidth, cy + 8, cx + width/2, cy + height/4, cx + width/2, bottomY);
            ctx.lineTo(cx - width/2, bottomY);
            ctx.bezierCurveTo(cx - width/2, cy + height/4, cx - neckWidth, cy + 8, cx - neckWidth, cy);
            ctx.clip();

            ctx.beginPath();
            ctx.moveTo(cx - width, bottomY);
            ctx.lineTo(cx, bottomY - bottomSandHeight - 10); 
            ctx.lineTo(cx + width, bottomY);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        // --- Falling Sand Stream ---
        if (percentage < 100 && percentage > 0) {
            ctx.strokeStyle = '#e5a93c';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(cx, cy - topSandHeight);
            ctx.lineTo(cx, bottomY - bottomSandHeight);
            ctx.stroke();
        }

        // --- Wood Frame ---
        ctx.fillStyle = '#3a2512'; 
        ctx.fillRect(cx - width/2 - 15, topY - 12, width + 30, 12);
        ctx.fillRect(cx - width/2 - 15, bottomY, width + 30, 12);
    }

    // Initialize layout setup
    initializeDropdowns();
    calculateLife();
</script>

</body>
</html>
